<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SWL — Agent Quoter 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.13.3/cdn.min.js" defer></script>
<style>
:root{
  --bg:#0a0a0a;--bg2:#111111;--bg3:#1a1a1a;--bg4:#222222;
  --border:#2a2a2a;--border2:#333333;
  --gold:#C9A84C;--gold2:#D4A843;--gold-dim:#C9A84C18;
  --text:#fff;--text2:#aaa;--text3:#666;
  --green:#22c55e;--green-dim:#22c55e15;
  --amber:#f59e0b;--amber-dim:#f59e0b15;
  --red:#ef4444;--red-dim:#ef444415;
  --blue:#3b82f6;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;font-size:13px;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:11px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
.logo{display:flex;align-items:center;gap:9px}
.logo-text{font-size:17px;font-weight:800;letter-spacing:-.3px}
.header-sub{font-size:11px;color:var(--text3);margin-top:1px}
.hbadge{background:var(--gold-dim);color:var(--gold);font-size:11px;font-weight:600;padding:3px 11px;border-radius:99px;border:1px solid #C9A84C33}
.header-right{display:flex;align-items:center;gap:10px}
.lang-toggle{display:flex;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;overflow:hidden}
.lang-btn{padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--text3);font-family:'Inter',sans-serif;transition:all .15s;letter-spacing:.3px}
.lang-btn.active{background:var(--gold);color:#000}
.lang-btn:hover:not(.active){color:var(--text);background:var(--bg4)}
.tabs-bar{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;padding:0 18px;flex-shrink:0;gap:0;overflow-x:auto}
.tab-btn{padding:9px 13px;font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;transition:all .15s;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:5px;white-space:nowrap}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{color:var(--text);border-bottom-color:var(--gold)}
.tab-badge{background:var(--gold-dim);color:var(--gold);font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px}
.content{flex:1;min-height:0;overflow:hidden;position:relative}
.tab-panel{display:none;position:absolute;inset:0;overflow:hidden;flex-direction:column}
.tab-panel.active{display:flex}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;border:none;transition:all .15s}
.btn-gold{background:var(--gold);color:#000}.btn-gold:hover{background:var(--gold2)}
.btn-out{background:transparent;color:var(--text2);border:1px solid var(--border2)}.btn-out:hover{background:var(--bg3);color:var(--text)}
.btn-danger{background:transparent;color:var(--red);border:1px solid #ef444430}.btn-danger:hover{background:var(--red-dim)}
.btn-save{background:transparent;color:var(--gold);border:1px solid #C9A84C44}.btn-save:hover{background:var(--gold-dim)}
.btn-blue{background:transparent;color:#60a5fa;border:1px solid #3b82f644}.btn-blue:hover{background:#3b82f618}
.btn-sm{padding:5px 9px;font-size:11px}
.inp{background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:7px 10px;font-size:12px;font-family:'Inter',sans-serif;outline:none;color:var(--text)}
.inp::placeholder{color:var(--text3)}
.inp:focus{border-color:#C9A84C55}
select.inp option{background:var(--bg3)}
.textarea{background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:8px 10px;font-size:12px;font-family:'Inter',sans-serif;outline:none;color:var(--text);resize:vertical;width:100%;min-height:70px;line-height:1.5}
.textarea:focus{border-color:#C9A84C55}
.tb{display:inline-block;padding:1px 7px;border-radius:99px;font-size:10px;font-weight:700}
.t1{background:var(--green-dim);color:var(--green);border:1px solid #22c55e25}
.t2{background:var(--amber-dim);color:var(--amber);border:1px solid #f59e0b25}
.t3{background:var(--red-dim);color:var(--red);border:1px solid #ef444425}

/* ── HOME ── */
.home-scroll{flex:1;overflow-y:auto;min-height:0}
.home-hero{position:relative;overflow:hidden;min-height:240px;display:flex;align-items:center;padding:44px 48px}
.home-hero-bg{position:absolute;inset:0;background:linear-gradient(135deg,#0a0a0a 0%,#1a1208 40%,#2a1a06 70%,#0a0a0a 100%)}
.home-hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(201,168,76,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,.06) 1px,transparent 1px);background-size:40px 40px}
.home-hero-glow{position:absolute;top:-80px;right:-80px;width:500px;height:500px;background:radial-gradient(circle,rgba(201,168,76,.15) 0%,transparent 70%);pointer-events:none}
.hero-img-col{position:absolute;right:0;top:0;bottom:0;width:360px;overflow:hidden;opacity:.28}
.hero-img-col img{width:100%;height:100%;object-fit:cover}
.home-hero-content{position:relative;z-index:1;max-width:600px}
.home-hero-eyebrow{display:inline-flex;align-items:center;gap:7px;background:var(--gold-dim);border:1px solid #C9A84C33;border-radius:99px;padding:5px 14px;font-size:11px;font-weight:600;color:var(--gold);letter-spacing:.3px;margin-bottom:16px}
.home-hero h1{font-size:38px;font-weight:900;letter-spacing:-1.5px;line-height:1.08;margin-bottom:12px}
.home-hero h1 span{color:var(--gold)}
.home-hero p{font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:22px;max-width:500px}
.home-hero-actions{display:flex;gap:10px;flex-wrap:wrap}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--border)}
.stat-item{padding:16px 24px;border-right:1px solid var(--border)}
.stat-item:last-child{border-right:none}
.stat-val{font-size:26px;font-weight:900;color:var(--gold);letter-spacing:-1px;line-height:1}
.stat-label{font-size:11px;color:var(--text3);margin-top:4px;font-weight:500}
.stat-sub{font-size:10px;color:var(--text3);margin-top:2px;opacity:.7}
.home-section{padding:24px 32px}
.home-section-hd{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px}
.home-section-hd h2{font-size:18px;font-weight:800;letter-spacing:-.4px}
.home-section-hd p{font-size:12px;color:var(--text3);margin-top:2px}
.home-section-hd a{font-size:12px;color:var(--gold);cursor:pointer}
.plat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.plat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s}
.plat-card:hover{border-color:#C9A84C44;transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.plat-card-img{height:100px;overflow:hidden;position:relative}
.plat-card-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.plat-card:hover .plat-card-img img{transform:scale(1.05)}
.plat-card-img-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,rgba(17,17,17,.9) 100%)}
.plat-card-img-badge{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:2px 7px;font-size:10px;font-weight:700;color:var(--text2);backdrop-filter:blur(4px)}
.plat-card-body{padding:12px 14px 14px}
.plat-card-name{font-size:12px;font-weight:700;margin-bottom:3px}
.plat-card-desc{font-size:11px;color:var(--text3);line-height:1.5;margin-bottom:8px}
.plat-card-impact{font-size:10px;color:var(--green);margin-bottom:8px}
.plat-card-footer{display:flex;align-items:center;justify-content:space-between}
.plat-card-count{font-size:10px;color:var(--text3)}
.plat-card-range{font-size:11px;font-weight:700;color:var(--gold);font-family:monospace}
.why-section{padding:24px 32px;border-top:1px solid var(--border);background:var(--bg2)}
.why-section h2{font-size:17px;font-weight:800;letter-spacing:-.4px;margin-bottom:14px}
.why-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.why-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.why-icon{font-size:18px;margin-bottom:7px}
.why-title{font-size:12px;font-weight:700;margin-bottom:3px}
.why-desc{font-size:11px;color:var(--text3);line-height:1.5}

/* ── QUOTER ── */
.quoter-layout{flex-direction:row !important}
.sidebar{width:196px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto}
.sidebar-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:10px 13px 4px}
.plat-btn{width:100%;text-align:left;padding:7px 13px;border:none;border-bottom:1px solid var(--border);background:transparent;cursor:pointer;color:var(--text2);font-family:'Inter',sans-serif;transition:all .12s}
.plat-btn:hover{background:var(--bg3);color:var(--text)}
.plat-btn.active{background:var(--bg3);border-left:2px solid var(--gold);padding-left:11px;color:var(--text)}
.plat-btn .pn{font-weight:600;font-size:12px;line-height:1.3}
.plat-btn .pm{font-size:10px;color:var(--text3);margin-top:1px}
.agent-area{flex:1;overflow-y:auto;padding:14px 16px;min-width:0}
.area-title{font-size:14px;font-weight:700;margin-bottom:2px}
.area-sub{font-size:11px;color:var(--text3);margin-bottom:10px}
.search-row{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap}
/* Tier section headers */
.tier-section{margin-bottom:14px}
.tier-section-hd{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:7px;margin-bottom:6px;cursor:pointer;user-select:none}
.tier-section-hd.light{background:#22c55e12;border:1px solid #22c55e20}
.tier-section-hd.full{background:#f59e0b12;border:1px solid #f59e0b20}
.tier-section-hd.addon{background:#ef444412;border:1px solid #ef444420}
.tier-hd-left{display:flex;align-items:center;gap:8px}
.tier-hd-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.tier-hd-label.light{color:var(--green)}
.tier-hd-label.full{color:var(--amber)}
.tier-hd-label.addon{color:var(--red)}
.tier-hd-count{font-size:10px;color:var(--text3)}
.tier-hd-right{display:flex;align-items:center;gap:8px}
.bundle-badge{font-size:10px;font-weight:600;color:var(--gold);background:var(--gold-dim);border:1px solid #C9A84C33;padding:1px 7px;border-radius:99px}
.tier-select-btn{font-size:10px;color:var(--text3);background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:2px 7px;cursor:pointer;font-family:'Inter',sans-serif}
.tier-select-btn:hover{color:var(--gold);border-color:#C9A84C44}
.cards{display:flex;flex-direction:column;gap:4px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;display:flex;align-items:flex-start;gap:9px;cursor:pointer;transition:all .12s}
.card:hover{border-color:var(--border2);background:var(--bg3)}
.card.sel{border-color:#C9A84C66;background:var(--gold-dim)}
.chk{width:16px;height:16px;border:1.5px solid var(--border2);border-radius:4px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;color:#000}
.card.sel .chk{background:var(--gold);border-color:var(--gold)}
.cinfo{flex:1;min-width:0}
.cname{font-weight:600;font-size:12px}
.cmeta{display:flex;gap:6px;margin-top:3px;flex-wrap:wrap;align-items:center}
.cprice{font-size:11px;color:var(--text3)}
.cretainer-row{display:flex;align-items:center;gap:4px;margin-top:2px}
.cretainer-label{font-size:10px;color:var(--text3)}
.cretainer-val{font-size:11px;color:var(--gold)}
.cnote{font-size:10px;color:var(--text3);font-style:italic;margin-top:2px}
.discount-chip{font-size:10px;color:var(--green);font-weight:600;background:var(--green-dim);border:1px solid #22c55e25;border-radius:4px;padding:1px 6px;margin-left:4px}
/* Quote panel */
.qp{width:280px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.qp-head{padding:11px 13px;border-bottom:1px solid var(--border);flex-shrink:0}
.qp-head h3{font-size:13px;font-weight:700}
.qp-head p{font-size:11px;color:var(--text3);margin-top:1px}
.qp-inp{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:7px 10px;font-size:12px;font-family:'Inter',sans-serif;margin-top:7px;outline:none;color:var(--text)}
.qp-inp::placeholder{color:var(--text3)}
.qp-inp:focus{border-color:#C9A84C55}
.qlist{flex:1;overflow-y:auto;padding:7px 12px}
.qempty{text-align:center;padding:24px 12px;color:var(--text3);font-size:12px}
.qi{padding:6px 0;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:6px}
.qi:last-child{border-bottom:none}
.qi-info{flex:1;min-width:0}
.qi-name{font-weight:600;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qi-plat{font-size:10px;color:var(--text3)}
.qi-price{font-size:11px;color:var(--gold);margin-top:2px;font-family:monospace}
.qi-disc{font-size:10px;color:var(--green);font-weight:600}
.qi-var{margin-top:4px;display:flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:3px 6px}
.qi-var label{font-size:10px;color:var(--text3);white-space:nowrap}
.qi-var input{background:transparent;border:none;outline:none;color:var(--gold);font-size:11px;font-family:monospace;width:60px;font-weight:600}
.qi-var-extra{font-size:10px;color:var(--text3)}
.qi-rm{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:0 2px;flex-shrink:0;line-height:1}
.qi-rm:hover{color:var(--red)}
.qtotals{padding:10px 13px;border-top:1px solid var(--border);background:var(--bg3);flex-shrink:0}
.qtr{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}
.qtr:last-child{margin-bottom:0}
.qtl{color:var(--text3)}.qtv{font-weight:700;font-family:monospace;font-size:11px}
.qtr.big .qtl{font-size:12px;font-weight:600;color:var(--text2)}
.qtr.big .qtv{font-size:13px;color:var(--gold)}
.qtr.disc-row .qtv{color:var(--green)}
.qactions{padding:9px 12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:5px;flex-shrink:0}

/* ── PROJECTS ── */
.projects-scroll{flex:1;overflow-y:auto;padding:22px 26px;min-height:0}
.projects-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.projects-header h2{font-size:16px;font-weight:700}
.proj-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:13px 15px;transition:all .15s;margin-bottom:9px}
.proj-card:hover{border-color:#C9A84C44}
.proj-card.active-proj{border-color:var(--gold);background:var(--gold-dim)}
.proj-card-head{display:flex;align-items:flex-start;gap:11px}
.proj-icon{width:34px;height:34px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.proj-info{flex:1;min-width:0}
.proj-name{font-weight:700;font-size:13px;margin-bottom:2px}
.proj-meta{font-size:11px;color:var(--text3);margin-bottom:5px}
.proj-agents{display:flex;gap:4px;flex-wrap:wrap}
.proj-agent-chip{font-size:10px;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:2px 6px;color:var(--text2);white-space:nowrap}
.proj-actions-col{display:flex;gap:5px;flex-direction:column;align-items:flex-end;flex-shrink:0}
.proj-totals{text-align:right}
.proj-setup{font-size:11px;color:var(--text3)}
.proj-retainer{font-size:13px;font-weight:700;color:var(--gold);font-family:monospace}
.active-badge{background:var(--gold-dim);color:var(--gold);font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;border:1px solid #C9A84C44}
.version-badge{background:var(--bg3);color:var(--text3);font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;border:1px solid var(--border2)}
.versions-accordion{margin-top:9px;border-top:1px solid var(--border);padding-top:9px}
.version-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--border)}
.version-row:last-child{border-bottom:none}
.version-info{flex:1}
.version-label{font-size:11px;font-weight:600}
.version-meta{font-size:10px;color:var(--text3)}
.projects-empty{text-align:center;padding:60px 20px;color:var(--text3)}

/* ── COMPARE ── */
.compare-scroll{flex:1;overflow-y:auto;padding:18px 22px;min-height:0}
.compare-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.compare-header h2{font-size:16px;font-weight:700}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.compare-col{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.compare-col-head{padding:10px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg3)}
.compare-col-head h3{font-size:12px;font-weight:700}
.compare-col-body{padding:11px 13px}
.compare-empty{text-align:center;padding:20px;color:var(--text3);font-size:12px}
.compare-agent-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border);font-size:11px}
.compare-agent-row:last-child{border-bottom:none}
.compare-summary{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px}
.compare-row{display:grid;grid-template-columns:190px 1fr 1fr;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);align-items:center;font-size:12px}
.compare-row:last-child{border-bottom:none}
.compare-row.hdr{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px}
.compare-metric{color:var(--text3)}
.compare-val{font-weight:700;font-family:monospace}
.compare-winner{color:var(--green)}
.compare-loser{color:var(--text3)}

/* ── DISCOUNTS TAB ── */
.disc-scroll{flex:1;overflow-y:auto;padding:22px 26px;min-height:0}
.disc-scroll h2{font-size:16px;font-weight:700;margin-bottom:4px}
.disc-scroll .sub{font-size:12px;color:var(--text3);margin-bottom:20px}
.disc-section{margin-bottom:24px}
.disc-section h3{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.disc-section h3 span{font-size:11px;color:var(--text3);font-weight:400}
.disc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.disc-card{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:13px 14px}
.disc-card-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px}
.disc-card-desc{font-size:10px;color:var(--text3);margin-bottom:8px;line-height:1.5}
.disc-inp-row{display:flex;align-items:center;gap:6px}
.disc-inp-row input{background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:5px 8px;font-size:13px;font-family:monospace;color:var(--gold);width:60px;outline:none;font-weight:700}
.disc-inp-row input:focus{border-color:#C9A84C55}
.disc-inp-row span{font-size:12px;color:var(--text3)}
.pkg-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:15px 16px;margin-bottom:10px}
.pkg-card-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.pkg-card-name{font-size:13px;font-weight:700}
.pkg-card-badge{background:var(--gold-dim);color:var(--gold);font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;border:1px solid #C9A84C33}
.pkg-field{display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
.pkg-field label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.pkg-field input,.pkg-field textarea{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:6px 9px;font-size:11px;font-family:'Inter',sans-serif;outline:none;color:var(--text)}
.pkg-field input:focus,.pkg-field textarea:focus{border-color:#C9A84C55}
.pkg-field textarea{resize:vertical;min-height:50px;line-height:1.5}
.pkg-fields-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* ── SETUP ── */
.setup-toolbar{padding:11px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--bg2);flex-wrap:wrap}
.setup-toolbar h2{font-size:13px;font-weight:700}
.setup-toolbar .sub{font-size:11px;color:var(--text3)}
.setup-filter{display:flex;gap:7px;margin-left:auto}
.setup-scroll{flex:1;overflow-y:auto;min-height:0}
.setup-table{width:100%;border-collapse:collapse}
.setup-table thead th{position:sticky;top:0;z-index:2;background:var(--bg3);padding:7px 9px;text-align:left;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--border2);white-space:nowrap}
.setup-table tbody tr{border-bottom:1px solid var(--border)}
.setup-table tbody tr:hover{background:#ffffff06}
.setup-table td{padding:4px 7px;vertical-align:middle}
.plat-tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;background:var(--bg4);color:var(--text3);white-space:nowrap}
.ed{background:var(--bg3);border:1px solid transparent;border-radius:5px;padding:4px 7px;font-size:11px;font-family:'Inter',sans-serif;color:var(--text);outline:none}
.ed:focus{border-color:#C9A84C55;background:var(--bg4)}
.tier-sel{background:var(--bg3);border:1px solid transparent;border-radius:5px;padding:4px 6px;font-size:11px;font-family:'Inter',sans-serif;color:var(--text);width:56px;outline:none}
.reset-btn{background:none;border:1px solid var(--border2);cursor:pointer;color:var(--text3);font-size:10px;padding:2px 6px;border-radius:4px;font-family:'Inter',sans-serif}
.reset-btn:hover{color:var(--gold);border-color:#C9A84C44}
.var-block{display:flex;flex-direction:column;gap:3px}
.var-row{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3)}
.var-row input{background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:3px 6px;font-size:11px;font-family:monospace;color:var(--gold);width:68px;outline:none}

/* ── MEDIA ── */
.media-scroll{flex:1;overflow-y:auto;padding:22px 26px;min-height:0}
.media-scroll h2{font-size:16px;font-weight:700;margin-bottom:4px}
.media-scroll .sub{font-size:12px;color:var(--text3);margin-bottom:18px}
.media-section{margin-bottom:22px}
.media-section h3{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.media-section h3 span{font-size:11px;color:var(--text3);font-weight:400}
.logo-upload-box{background:var(--bg2);border:2px dashed var(--border2);border-radius:12px;padding:18px;display:flex;align-items:center;gap:14px;max-width:460px;cursor:pointer;transition:border-color .15s}
.logo-upload-box:hover{border-color:#C9A84C66}
.logo-preview{width:56px;height:56px;background:var(--bg3);border-radius:10px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.logo-preview img{width:100%;height:100%;object-fit:contain}
.logo-upload-info h4{font-size:12px;font-weight:600;margin-bottom:3px}
.logo-upload-info p{font-size:11px;color:var(--text3);margin-bottom:5px}
.url-row{display:flex;gap:8px;align-items:center;margin-top:8px;max-width:460px}
.url-row input{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:6px 9px;font-size:11px;font-family:'Inter',sans-serif;outline:none;color:var(--text)}
.url-row input:focus{border-color:#C9A84C55}
.plat-media-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.plat-media-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.plat-media-preview{height:72px;overflow:hidden;position:relative;cursor:pointer}
.plat-media-preview img{width:100%;height:100%;object-fit:cover}
.plat-media-overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.plat-media-preview:hover .plat-media-overlay{opacity:1}
.plat-media-overlay span{font-size:11px;font-weight:600;color:#fff}
.plat-media-body{padding:9px 10px}
.plat-media-name{font-size:11px;font-weight:700;margin-bottom:4px}
.plat-url-inp{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:5px 8px;font-size:11px;font-family:'Inter',sans-serif;outline:none;color:var(--text);margin-bottom:5px}
.plat-desc-inp{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:5px 8px;font-size:11px;font-family:'Inter',sans-serif;outline:none;color:var(--text);resize:vertical;min-height:44px;line-height:1.5;margin-bottom:5px}
.media-btn-row{display:flex;gap:5px}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:13px;padding:20px;width:740px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.6)}
.modal-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:13px}
.modal-hd h2{font-size:14px;font-weight:700}
.modal-hd p{font-size:11px;color:var(--text3);margin-top:2px}
.modal-x{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;cursor:pointer;color:var(--text3);width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.modal-x:hover{color:var(--text)}
.form-row{display:flex;gap:10px;margin-bottom:10px}
.form-group{display:flex;flex-direction:column;gap:4px;flex:1}
.form-group label{font-size:11px;font-weight:600;color:var(--text2)}
.form-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--gold);margin:13px 0 7px;padding-bottom:5px;border-bottom:1px solid var(--border)}

/* ── PLATFORM DETAIL MODAL ── */
.plat-modal{width:820px;max-width:96vw;background:var(--bg2)}
.plat-modal-hero{height:180px;overflow:hidden;position:relative;border-radius:9px;margin-bottom:16px}
.plat-modal-hero img{width:100%;height:100%;object-fit:cover}
.plat-modal-hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,rgba(10,10,10,.92) 100%)}
.plat-modal-hero-text{position:absolute;bottom:14px;left:18px;right:18px}
.plat-modal-hero-text h2{font-size:22px;font-weight:900;letter-spacing:-.5px;margin-bottom:3px}
.plat-modal-hero-text p{font-size:12px;color:var(--text2);line-height:1.5}
.plat-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.plat-detail-col{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:14px 15px}
.plat-detail-col-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.plat-detail-col-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px}
.plat-detail-col-label.light{color:var(--green)}
.plat-detail-col-label.full{color:var(--amber)}
.plat-detail-col-label.addon{color:var(--red)}
.plat-detail-agent{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--border);font-size:11px}
.plat-detail-agent:last-child{border-bottom:none}
.plat-detail-agent-name{flex:1;color:var(--text2)}
.plat-detail-meta-row{display:flex;gap:12px;margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
.plat-detail-meta-item{display:flex;flex-direction:column;gap:2px}
.plat-detail-meta-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text3)}
.plat-detail-meta-val{font-size:12px;font-weight:700;color:var(--gold)}
.plat-addon-list{margin-top:6px}
.plat-addon-item{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--border);font-size:11px}
.plat-addon-item:last-child{border-bottom:none}

/* PDF wrap */
.pdf-wrap{background:#fff;border-radius:9px;padding:26px 30px;color:#1a1a1a;font-family:'Inter',sans-serif}
</style>
</head>
<body x-data="agentApp()" x-init="init()">

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <template x-if="!customLogo">
      <svg width="26" height="22" viewBox="0 0 30 26" fill="none"><path d="M0 18L6 10L12 18L6 22Z" fill="url(#h1)"/><path d="M9 12L15 4L21 12L15 16Z" fill="url(#h2)"/><path d="M18 18L24 10L30 18L24 22Z" fill="url(#h3)"/>
        <defs><linearGradient id="h1" x1="6" y1="10" x2="6" y2="22" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#e8c96a"/><stop offset="100%" stop-color="#8B5E1A"/></linearGradient><linearGradient id="h2" x1="15" y1="4" x2="15" y2="16" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#f0d070"/><stop offset="100%" stop-color="#C9A84C"/></linearGradient><linearGradient id="h3" x1="24" y1="10" x2="24" y2="22" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#d4a843"/><stop offset="100%" stop-color="#7a5015"/></linearGradient></defs>
      </svg>
    </template>
    <template x-if="customLogo"><img :src="customLogo" style="height:28px;width:auto;object-fit:contain" alt="Logo"/></template>
    <div>
      <div class="logo-text">SWL</div>
      <div class="header-sub" x-text="t('headerSub')"></div>
    </div>
  </div>
  <div class="header-right">
    <div class="lang-toggle">
      <button class="lang-btn" :class="{active:lang==='en'}" @click="setLang('en')">EN</button>
      <button class="lang-btn" :class="{active:lang==='es'}" @click="setLang('es')">ES</button>
    </div>
    <span class="hbadge" x-text="t('badge')"></span>
  </div>
</div>

<!-- TABS -->
<div class="tabs-bar">
  <button class="tab-btn" :class="{active:activeTab==='home'}" @click="activeTab='home'">🏠 <span x-text="t('home')"></span></button>
  <button class="tab-btn" :class="{active:activeTab==='quoter'}" @click="activeTab='quoter'">
    🧩 <span x-text="t('buildQuote')"></span>
    <span class="tab-badge" x-show="quote.length>0" x-text="quote.length"></span>
  </button>
  <button class="tab-btn" :class="{active:activeTab==='projects'}" @click="activeTab='projects'">
    📁 <span x-text="t('projects')"></span>
    <span class="tab-badge" x-show="savedProjects.length>0" x-text="savedProjects.length"></span>
  </button>
  <button class="tab-btn" :class="{active:activeTab==='compare'}" @click="activeTab='compare'">⚖️ <span x-text="t('compare')"></span></button>
  <button class="tab-btn" :class="{active:activeTab==='discounts'}" @click="activeTab='discounts'">🏷️ <span x-text="t('discounts')"></span></button>
  <button class="tab-btn" :class="{active:activeTab==='setup'}" @click="activeTab='setup'">⚙️ <span x-text="t('agentSetup')"></span></button>
  <button class="tab-btn" :class="{active:activeTab==='media'}" @click="activeTab='media'">🖼️ <span x-text="t('media')"></span></button>
</div>

<div class="content">

<!-- ══ HOME ══ -->
<div class="tab-panel" :class="{active:activeTab==='home'}">
  <div class="home-scroll">
    <div class="home-hero">
      <div class="home-hero-bg"></div><div class="home-hero-grid"></div><div class="home-hero-glow"></div>
      <div class="hero-img-col"><img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=800&q=80" alt=""/></div>
      <div class="home-hero-content">
        <div class="home-hero-eyebrow"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="13,2 3,14 12,14 11,22 21,10 12,10"/></svg><span x-text="t('heroEyebrow')"></span></div>
        <h1><span x-text="t('heroH1a')"></span><br><span x-text="t('heroH1b')"></span></h1>
        <p x-text="t('heroP')"></p>
        <div class="home-hero-actions">
          <button class="btn btn-gold" style="padding:10px 20px;font-size:13px" @click="activeTab='quoter'" x-text="t('buildQuoteBtn')"></button>
          <button class="btn btn-out" style="padding:10px 20px;font-size:13px" @click="activeTab='setup'" x-text="t('configureBtn')"></button>
        </div>
      </div>
    </div>
    <div class="stats-bar">
      <div class="stat-item"><div class="stat-val" x-text="totalAgents()"></div><div class="stat-label" x-text="t('statAgents')"></div><div class="stat-sub" x-text="t('statAgentsSub')"></div></div>
      <div class="stat-item"><div class="stat-val">500+</div><div class="stat-label" x-text="t('statHours')"></div><div class="stat-sub" x-text="t('statHoursSub')"></div></div>
      <div class="stat-item"><div class="stat-val">3–5×</div><div class="stat-label" x-text="t('statROI')"></div><div class="stat-sub" x-text="t('statROISub')"></div></div>
      <div class="stat-item"><div class="stat-val" x-text="savedProjects.length||'—'"></div><div class="stat-label" x-text="t('statQuotes')"></div><div class="stat-sub"><span x-show="savedProjects.length===0" x-text="t('noProjects')"></span><span x-show="savedProjects.length>0" style="color:var(--gold);cursor:pointer" @click="activeTab='projects'" x-text="t('viewArrow')"></span></div></div>
    </div>
    <div class="home-section">
      <div class="home-section-hd"><div><h2 x-text="t('platformPortfolio')"></h2><p x-text="t('platformSub')"></p></div><a @click="activeTab='quoter'" x-text="t('viewAll')"></a></div>
      <div class="plat-grid">
        <template x-for="p in platforms" :key="p.id">
          <div class="plat-card" @click="openPlatModal(p)">
            <div class="plat-card-img">
              <img :src="p.img" :alt="p.name" loading="lazy"/>
              <div class="plat-card-img-overlay"></div>
              <div class="plat-card-img-badge" x-text="p.agents.length+' '+t('agents')"></div>
            </div>
            <div class="plat-card-body">
              <div class="plat-card-name" x-text="p.name"></div>
              <div class="plat-card-desc" x-text="p.desc[lang]"></div>
              <div class="plat-card-impact" x-text="p.impact"></div>
              <div class="plat-card-footer"><span class="plat-card-count" x-text="t('setupFrom')"></span><span class="plat-card-range" x-text="p.setupRange"></span></div>
            </div>
          </div>
        </template>
      </div>
    </div>
    <div class="why-section">
      <h2 x-text="t('whyTitle')"></h2>
      <div class="why-grid">
        <div class="why-card"><div class="why-icon">⚡</div><div class="why-title" x-text="t('why1t')"></div><div class="why-desc" x-text="t('why1d')"></div></div>
        <div class="why-card"><div class="why-icon">🔗</div><div class="why-title" x-text="t('why2t')"></div><div class="why-desc" x-text="t('why2d')"></div></div>
        <div class="why-card"><div class="why-icon">📊</div><div class="why-title" x-text="t('why3t')"></div><div class="why-desc" x-text="t('why3d')"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- ══ QUOTER ══ -->
<div class="tab-panel quoter-layout" :class="{active:activeTab==='quoter'}">
  <div class="sidebar">
    <div class="sidebar-label" x-text="t('platforms')"></div>
    <template x-for="p in platforms" :key="p.id">
      <button class="plat-btn" :class="{active:activePlat===p.id}" @click="activePlat=p.id;search='';filterTier=0">
        <div class="pn" x-text="p.name"></div>
        <div class="pm" x-text="p.agents.length+' '+t('agents')"></div>
      </button>
    </template>
  </div>
  <div class="agent-area">
    <div class="area-title" x-text="currentPlatform().name"></div>
    <div class="area-sub" x-text="currentPlatform().agents.length+' '+t('agentsClick')"></div>
    <!-- Bundle discount indicator -->
    <template x-if="activeBundleDiscount()>0">
      <div style="background:var(--green-dim);border:1px solid #22c55e25;border-radius:7px;padding:6px 10px;margin-bottom:8px;font-size:11px;color:var(--green);display:flex;align-items:center;gap:6px">
        <span>🏷️</span>
        <span x-text="activeBundleDiscountLabel()"></span>
      </div>
    </template>
    <div class="search-row">
      <input class="inp" style="width:170px" type="text" :placeholder="t('searchAgent')" x-model="search"/>
      <select class="inp" x-model.number="filterTier">
        <option value="0" x-text="t('allTiers')"></option>
        <option value="1">T1 — Light</option><option value="2">T2 — Full</option><option value="3">T3 — Add-on</option>
      </select>
    </div>
    <!-- Grouped by tier section -->
    <template x-if="!search && filterTier===0">
      <div>
        <template x-for="sec in tierSections()" :key="sec.key">
          <template x-if="sec.agents.length>0">
            <div class="tier-section">
              <div class="tier-section-hd" :class="sec.key" @click="sec.open=!sec.open">
                <div class="tier-hd-left">
                  <span class="tier-hd-label" :class="sec.key" x-text="sec.label"></span>
                  <span class="tier-hd-count" x-text="'('+sec.agents.length+')'"></span>
                  <template x-if="sec.bundleDisc>0">
                    <span class="bundle-badge" x-text="sec.bundleDisc+'% bundle'"></span>
                  </template>
                </div>
                <div class="tier-hd-right">
                  <button class="tier-select-btn" @click.stop="selectAllInSection(sec)" x-text="allInSectionSelected(sec)?t('deselectAll'):t('selectAll')"></button>
                  <span style="font-size:12px;color:var(--text3)" x-text="sec.open?'▾':'▸'"></span>
                </div>
              </div>
              <template x-if="sec.open">
                <div class="cards">
                  <template x-for="a in sec.agents" :key="a._uid">
                    <div class="card" :class="{sel:isSelected(a)}" @click="toggleAgent(a)">
                      <div class="chk"><template x-if="isSelected(a)"><svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></template></div>
                      <div class="cinfo">
                        <div style="display:flex;align-items:center;gap:6px">
                          <span class="cname" x-text="a.name"></span>
                          <template x-if="getAgentDiscount(a)>0">
                            <span class="discount-chip" x-text="'-'+getAgentDiscount(a)+'%'"></span>
                          </template>
                        </div>
                        <div class="cmeta"><span class="tb" :class="'t'+a.tier" x-text="'T'+a.tier"></span><span class="cprice" x-text="t('setup')+': '+a.setup"></span></div>
                        <div class="cretainer-row"><span class="cretainer-label" x-text="t('retainer')+':'"></span><span class="cretainer-val" x-text="a.retainerShort"></span></div>
                        <div class="cnote" x-text="a.note[lang]"></div>
                      </div>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </template>
        </template>
      </div>
    </template>
    <!-- Search/filter results flat -->
    <template x-if="search || filterTier>0">
      <div class="cards">
        <template x-for="a in filtered()" :key="a._uid">
          <div class="card" :class="{sel:isSelected(a)}" @click="toggleAgent(a)">
            <div class="chk"><template x-if="isSelected(a)"><svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></template></div>
            <div class="cinfo">
              <div class="cname" x-text="a.name"></div>
              <div class="cmeta"><span class="tb" :class="'t'+a.tier" x-text="'T'+a.tier"></span><span class="cprice" x-text="t('setup')+': '+a.setup"></span></div>
              <div class="cretainer-row"><span class="cretainer-label" x-text="t('retainer')+':'"></span><span class="cretainer-val" x-text="a.retainerShort"></span></div>
              <div class="cnote" x-text="a.note[lang]"></div>
            </div>
          </div>
        </template>
        <template x-if="filtered().length===0"><div style="text-align:center;padding:36px;color:var(--text3);font-size:12px" x-text="t('noMatch')"></div></template>
      </div>
    </template>
  </div>
  <!-- Quote Panel -->
  <div class="qp">
    <div class="qp-head">
      <h3 x-text="t('quoteBuilder')"></h3>
      <p x-text="quote.length+' '+t('agentsSelected')"></p>
      <input class="qp-inp" type="text" :placeholder="t('projectName')" x-model="projectName"/>
    </div>
    <div class="qlist">
      <template x-if="quote.length===0"><div class="qempty"><div style="font-size:22px;margin-bottom:8px">✦</div><div x-text="t('quoteEmpty')"></div></div></template>
      <template x-for="(item,i) in quote" :key="item.uid">
        <div class="qi">
          <div class="qi-info">
            <div class="qi-name" x-text="item.name"></div>
            <div class="qi-plat" x-text="item.platform"></div>

                <input type="number" :min="item.varMin||0" x-model.number="item.varValue" @input="persist()"/>

              <span class="active-badge" x-show="currentProjectId===proj.id" x-text="t('active')"></span>
              <span class="version-badge" x-text="(proj.versions?proj.versions.length:1)+' v'"></span>

<!-- ══ COMPARE ══ -->
<div class="tab-panel" :class="{active:activeTab==='compare'}">
  <div class="compare-scroll">
    <div class="compare-header"><div><h2 x-text="t('compareTitle')"></h2><p style="font-size:12px;color:var(--text3);margin-top:2px" x-text="t('compareSub')"></p></div><button class="btn btn-gold btn-sm" @click="exportComparePDF()" x-show="compareA.agents.length>0||compareB.agents.length>0" x-text="t('exportComparePDF')"></button></div>
    <div class="compare-grid">
      <div class="compare-col">
        <div class="compare-col-head"><h3 x-text="t('scenarioA')"></h3><div style="display:flex;gap:5px"><select class="inp" style="font-size:11px;padding:4px 7px" x-model="compareAId" @change="loadCompareProject('A')"><option value="" x-text="t('selectProject')"></option><template x-for="(p,i) in savedProjects" :key="p.id"><option :value="String(i)" x-text="p.name||t('unnamedProject')"></option></template></select><button class="btn btn-gold btn-sm" @click="loadCurrentToCompare('A')" x-show="quote.length>0" x-text="t('useCurrent')"></button></div></div>
        <div class="compare-col-body"><template x-if="compareA.agents.length===0"><div class="compare-empty" x-text="t('compareEmpty')"></div></template><template x-if="compareA.agents.length>0"><div><div style="font-size:11px;color:var(--text3);margin-bottom:8px" x-text="compareA.agents.length+' '+t('agents')"></div><template x-for="a in compareA.agents" :key="a.name+a.platform"><div class="compare-agent-row"><span style="color:var(--text2);flex:1;font-size:11px" x-text="a.name"></span><span style="color:var(--gold);font-family:monospace;font-size:10px" x-text="'$'+fmtN(a.retainerNum||0)+'/mo'"></span></div></template></div></template></div>
      </div>
      <div class="compare-col">
        <div class="compare-col-head"><h3 x-text="t('scenarioB')"></h3><div style="display:flex;gap:5px"><select class="inp" style="font-size:11px;padding:4px 7px" x-model="compareBId" @change="loadCompareProject('B')"><option value="" x-text="t('selectProject')"></option><template x-for="(p,i) in savedProjects" :key="p.id"><option :value="String(i)" x-text="p.name||t('unnamedProject')"></option></template></select><button class="btn btn-gold btn-sm" @click="loadCurrentToCompare('B')" x-show="quote.length>0" x-text="t('useCurrent')"></button></div></div>
        <div class="compare-col-body"><template x-if="compareB.agents.length===0"><div class="compare-empty" x-text="t('compareEmpty')"></div></template><template x-if="compareB.agents.length>0"><div><div style="font-size:11px;color:var(--text3);margin-bottom:8px" x-text="compareB.agents.length+' '+t('agents')"></div><template x-for="a in compareB.agents" :key="a.name+a.platform"><div class="compare-agent-row"><span style="color:var(--text2);flex:1;font-size:11px" x-text="a.name"></span><span style="color:var(--gold);font-family:monospace;font-size:10px" x-text="'$'+fmtN(a.retainerNum||0)+'/mo'"></span></div></template></div></template></div>
      </div>
    </div>
    <template x-if="compareA.agents.length>0||compareB.agents.length>0">
      <div class="compare-summary">
        <h3 x-text="t('comparisonSummary')"></h3>
        <div class="compare-row hdr"><span></span><span x-text="compareA.name||t('scenarioA')"></span><span x-text="compareB.name||t('scenarioB')"></span></div>
        <div class="compare-row"><span class="compare-metric" x-text="t('agents')"></span><span class="compare-val" x-text="compareA.agents.length"></span><span class="compare-val" x-text="compareB.agents.length"></span></div>
        <div class="compare-row"><span class="compare-metric" x-text="t('setupLow')"></span><span class="compare-val" :class="compareSetupLow('A')<=compareSetupLow('B')?'compare-winner':'compare-loser'" x-text="'$'+fmtN(compareSetupLow('A'))"></span><span class="compare-val" :class="compareSetupLow('B')<=compareSetupLow('A')?'compare-winner':'compare-loser'" x-text="'$'+fmtN(compareSetupLow('B'))"></span></div>
        <div class="compare-row"><span class="compare-metric" x-text="t('monthlyRetainer')"></span><span class="compare-val" :class="compareRetainer('A')<=compareRetainer('B')?'compare-winner':'compare-loser'" x-text="'$'+fmtN(compareRetainer('A'))+'/mo'"></span><span class="compare-val" :class="compareRetainer('B')<=compareRetainer('A')?'compare-winner':'compare-loser'" x-text="'$'+fmtN(compareRetainer('B'))+'/mo'"></span></div>
        <div class="compare-row"><span class="compare-metric" x-text="t('roiHours')"></span><span class="compare-val compare-winner" x-text="calcROI(compareA.agents).hours+'h/mo'"></span><span class="compare-val compare-winner" x-text="calcROI(compareB.agents).hours+'h/mo'"></span></div>
        <div class="compare-row"><span class="compare-metric" x-text="t('roiAvg')"></span><span class="compare-val compare-winner" x-text="calcROI(compareA.agents).roi+'x'"></span><span class="compare-val compare-winner" x-text="calcROI(compareB.agents).roi+'x'"></span></div>
        <div class="compare-row"><span class="compare-metric" x-text="t('roiPayback')"></span><span class="compare-val" x-text="calcROI(compareA.agents).payback+' mo'"></span><span class="compare-val" x-text="calcROI(compareB.agents).payback+' mo'"></span></div>
      </div>
    </template>
  </div>
</div>

window.agentApp=function agentApp(){
  return{
    activeTab:'home',activePlat:'growth',lang:'en',
    search:'',filterTier:0,setupSearch:'',setupPlatFilter:'',
    customLogo:'',logoUrlInput:'',
    quote:[],projectName:'',
    showModal:false,showCustomizer:false,
    showPlatModal:false,platModalData:null,
    platforms:[],savedProjects:[],currentProjectId:null,
    previewQ:{name:'',agents:[]},
    compareA:{name:'',agents:[]},compareB:{name:'',agents:[]},
    compareAId:'',compareBId:'',
    pdfMeta:{clientName:'',contactName:'',intro:'',priorities:'',conditions:'',nextSteps:''},
    discounts:{light:{},lightFull:{}},
    packages:[],
    _defaults:null,
    // tier section open state
    _secOpen:{light:true,full:true,addon:true},

    t(k){return(I18N[this.lang]||I18N.en)[k]||k;},

    setLang(l){
      this.lang=l;
      if(!this.pdfMeta.conditions||(this.pdfMeta.conditions===DC_EN||this.pdfMeta.conditions===DC_ES))
        this.pdfMeta.conditions=l==='es'?DC_ES:DC_EN;
      if(!this.pdfMeta.nextSteps||(this.pdfMeta.nextSteps===NS_EN||this.pdfMeta.nextSteps===NS_ES))
        this.pdfMeta.nextSteps=l==='es'?NS_ES:NS_EN;
      try{localStorage.setItem('swl_lang',l);}catch(e){}
    },

    // ── Tier sections ──
    tierSections(){
      const p=this.currentPlatform();
      const t1=p.agents.filter(a=>a.tier===1);
      const t2=p.agents.filter(a=>a.tier===2);
      const t3=p.agents.filter(a=>a.tier===3);
      const pid=p.id;
      const discLight=this.discounts.light[pid]||0;
      const discLF=this.discounts.lightFull[pid]||0;
      const activeDisc=this.activeBundleDiscount();
      return[
        {key:'light',label:this.t('lightDeployment'),agents:t1,bundleDisc:discLight,open:this._secOpen.light},
        {key:'full',label:this.t('fullDeployment'),agents:t2,bundleDisc:discLF,open:this._secOpen.full},
        {key:'addon',label:this.t('addons'),agents:t3,bundleDisc:0,open:this._secOpen.addon},
      ];
    },

    // Select/deselect all in a tier section
    allInSectionSelected(sec){
      const plat=this.currentPlatform().name;
      return sec.agents.length>0&&sec.agents.every(a=>this.quote.some(q=>q.name===a.name&&q.platform===plat));
    },
    selectAllInSection(sec){
      const plat=this.currentPlatform().name;
      if(this.allInSectionSelected(sec)){
        sec.agents.forEach(a=>{const idx=this.quote.findIndex(q=>q.name===a.name&&q.platform===plat);if(idx>=0)this.quote.splice(idx,1);});
      } else {
        sec.agents.forEach(a=>{if(!this.quote.some(q=>q.name===a.name&&q.platform===plat))this.quote.push({...a,platform:plat,uid:Date.now()+Math.random(),varValue:a.varDefault||a.varMin||0});});
      }
    },

    // ── Discount logic ──
    activeBundleDiscount(){
      const p=this.currentPlatform();
      const pid=p.id;
      const plat=p.name;
      const t1=p.agents.filter(a=>a.tier===1);
      const t2=p.agents.filter(a=>a.tier===2);
      const selNames=this.quote.filter(q=>q.platform===plat).map(q=>q.name);
      const allT1Sel=t1.length>0&&t1.every(a=>selNames.includes(a.name));
      const allT2Sel=t2.length>0&&t2.every(a=>selNames.includes(a.name));
      if(allT1Sel&&allT2Sel)return this.discounts.lightFull[pid]||0;
      if(allT1Sel)return this.discounts.light[pid]||0;
      return 0;
    },
    activeBundleDiscountLabel(){
      const d=this.activeBundleDiscount();
      if(d===0)return'';
      const p=this.currentPlatform();
      const pid=p.id;
      if(d===(this.discounts.lightFull[pid]||0))return d+'% bundle discount — Light + Full deployment selected';
      return d+'% bundle discount — Full Light deployment selected';
    },

    // Per-agent discount (checks if its platform has all of its tier selected)
    getAgentDiscount(agent){
      const pid=this.platforms.find(p=>p.name===agent.platform||p.name===agent._platformName)?.id;
      if(!pid)return 0;
      const p=this.platforms.find(pl=>pl.id===pid);
      if(!p)return 0;
      const plat=p.name;
      const tier=agent.tier;
      const sameTier=p.agents.filter(a=>a.tier===tier);
      const selNames=this.quote.filter(q=>q.platform===plat).map(q=>q.name);
      const allSel=sameTier.length>0&&sameTier.every(a=>selNames.includes(a.name));
      if(!allSel)return 0;
      if(tier===1){
        const t2=p.agents.filter(a=>a.tier===2);
        const allT2=t2.length>0&&t2.every(a=>selNames.includes(a.name));
        if(allT2)return this.discounts.lightFull[pid]||0;
        return this.discounts.light[pid]||0;
      }
      if(tier===2){
        const t1=p.agents.filter(a=>a.tier===1);
        const allT1=t1.length>0&&t1.every(a=>selNames.includes(a.name));
        if(allT1)return this.discounts.lightFull[pid]||0;
        return 0;
      }
      return 0;
    },

    totalDiscount(){
      return this.quote.reduce((s,item)=>{
        const d=this.getAgentDiscount(item);
        if(!d)return s;
        const base=item.retainerNum||0;
        const over=Math.max(0,(item.varValue||0)-(item.varMin||0));
        const gross=base+Math.round(over*(item.varRate||0));
        return s+Math.round(gross*d/100);
      },0);
    },

    // ── ROI ──
    calcROI(agents){
      let hours=0,totalVal=0;
      agents.forEach(a=>{const r=AGENT_ROI[a.name]||{h:15,val:3000};hours+=r.h;totalVal+=r.val;});
      const monthlyRetainer=agents.reduce((s,i)=>s+(i.retainerNum||0),0);
      const setupMid=agents.reduce((s,a)=>s+((a.setupLow||0)+(a.setupHigh||0))/2,0);
      const annualRetainer=monthlyRetainer*12;
      const roi=annualRetainer>0?Math.round((totalVal/annualRetainer)*10)/10:0;
      const payback=monthlyRetainer>0?Math.round(setupMid/Math.max(totalVal/12-monthlyRetainer,1)):0;
      return{hours,roi:Math.max(roi,1),payback:Math.max(1,Math.min(payback,36))};
    },

    // ── Init ──
    init(){
      this._defaults=JSON.parse(JSON.stringify(buildPlatforms()));
      this.pdfMeta.conditions=DC_EN;this.pdfMeta.nextSteps=NS_EN;
      try{
        const sl=localStorage.getItem('swl_lang');
        if(sl){this.lang=sl;if(sl==='es'){this.pdfMeta.conditions=DC_ES;this.pdfMeta.nextSteps=NS_ES;}}
        const raw=localStorage.getItem('swl_v7');
        if(raw){
          const d=JSON.parse(raw);
          if(d.platforms){this.platforms=d.platforms;this.platforms.forEach((p)=>{if(!p.img)p.img=DEFAULT_IMGS[p.id]||DEFAULT_IMGS.datasense;p.agents.forEach((a,i)=>{a._uid=p.id+'__'+i;a._platformName=p.name;});});}
          else this.platforms=buildPlatforms();
          this.quote=d.quote||[];this.projectName=d.project||'';
          this.savedProjects=(d.sp||[]).map(p=>({...p,_showVersions:false}));
          this.currentProjectId=d.cpid||null;
          this.customLogo=d.logo||'';this.logoUrlInput=d.logo||'';
          if(d.imgs)this.platforms.forEach(p=>{if(d.imgs[p.id])p.img=d.imgs[p.id];});
          if(d.meta)this.pdfMeta=Object.assign(this.pdfMeta,d.meta);
          if(d.disc)this.discounts=d.disc; else this.discounts=defaultDiscounts(this.platforms);
          if(d.pkgs)this.packages=d.pkgs; else this.packages=defaultPackages();
        } else {this.platforms=buildPlatforms();this.discounts=defaultDiscounts(this.platforms);this.packages=defaultPackages();}
      }catch(e){this.platforms=buildPlatforms();this.discounts=defaultDiscounts(this.platforms);this.packages=defaultPackages();}
      this.$watch('platforms',()=>this.persist(),{deep:true});
      this.$watch('quote',()=>this.persist(),{deep:true});
      this.$watch('projectName',()=>this.persist());
      this.$watch('savedProjects',()=>this.persist(),{deep:true});
      this.$watch('customLogo',()=>this.persist());
      this.$watch('pdfMeta',()=>this.persist(),{deep:true});
      this.$watch('discounts',()=>this.persist(),{deep:true});
      this.$watch('packages',()=>this.persist(),{deep:true});
    },

    persist(){
      const imgs={};this.platforms.forEach(p=>imgs[p.id]=p.img);
      try{localStorage.setItem('swl_v7',JSON.stringify({platforms:this.platforms,quote:this.quote,project:this.projectName,sp:this.savedProjects.map(p=>{const{_showVersions,...r}=p;return r;}),cpid:this.currentProjectId,logo:this.customLogo,imgs,meta:this.pdfMeta,disc:this.discounts,pkgs:this.packages}));}catch(e){}
    },

    totalAgents(){return this.platforms.reduce((s,p)=>s+p.agents.length,0);},
    currentPlatform(){return this.platforms.find(p=>p.id===this.activePlat)||this.platforms[0];},
    goToQuoter(id){this.activePlat=id;this.activeTab='quoter';this.search='';this.filterTier=0;},

    // Platform detail modal
    openPlatModal(p){this.platModalData=p;this.showPlatModal=true;},
    goToQuoterFromModal(id){this.showPlatModal=false;this.goToQuoter(id);},
    platModalAgents(p,type){
      if(!p)return[];
      if(type==='light')return p.agents.filter(a=>a.tier===1);
      if(type==='full')return p.agents.filter(a=>a.tier===2);
      return p.agents.filter(a=>a.tier===3);
    },
    platModalROI(p,type){
      const agents=this.platModalAgents(p,type);
      const r=this.calcROI(agents);
      return r.roi+'x · '+r.hours+'h/mo';
    },
    platModalRetainer(p,type){
      return this.platModalAgents(p,type).reduce((s,a)=>s+(a.retainerNum||0),0);
    },

    filtered(){return this.currentPlatform().agents.filter(a=>a.name.toLowerCase().includes(this.search.toLowerCase())&&(this.filterTier===0||a.tier===this.filterTier));},
    allAgentsFiltered(){
      let res=[];this.platforms.forEach(p=>p.agents.forEach(a=>res.push(a)));
      if(this.setupSearch){const q=this.setupSearch.toLowerCase();res=res.filter(a=>a.name.toLowerCase().includes(q)||(a._platformName||'').toLowerCase().includes(q));}
      if(this.setupPlatFilter){const pf=this.platforms.find(p=>p.id===this.setupPlatFilter);if(pf)res=res.filter(a=>a._platformName===pf.name);}
      return res;
    },

    isSelected(a){return this.quote.some(q=>q.name===a.name&&q.platform===this.currentPlatform().name);},
    toggleAgent(a){
      const plat=this.currentPlatform().name;
      const idx=this.quote.findIndex(q=>q.name===a.name&&q.platform===plat);
      if(idx>=0)this.quote.splice(idx,1);
      else this.quote.push({...a,platform:plat,uid:Date.now()+Math.random(),varValue:a.varDefault||a.varMin||0});
    },
    removeFromQuote(i){this.quote.splice(i,1);},
    clearQuote(){if(confirm(this.lang==='es'?'¿Limpiar la cotización?':'Clear the entire quote?')){this.quote=[];this.projectName='';this.currentProjectId=null;}},

    computedRetainerStr(item){
      const base=item.retainerNum||0;
      if(!item.varLabel)return(item.retainerBase||'$'+this.fmtN(base))+'/mo fixed';
      const over=Math.max(0,(item.varValue||0)-(item.varMin||0));
      const varCost=Math.round(over*(item.varRate||0));
      if(varCost===0)return(item.retainerBase||'$'+this.fmtN(base))+'/mo (base)';
      return'$'+this.fmtN(base)+'/mo + $'+this.fmtN(varCost)+' = $'+this.fmtN(base+varCost)+'/mo';
    },
    setupLow(){return this.quote.reduce((s,a)=>s+(a.setupLow||0),0);},
    setupHigh(){return this.quote.reduce((s,a)=>s+(a.setupHigh||0),0);},
    retainerTotal(){
      const gross=this.quote.reduce((s,item)=>{const b=item.retainerNum||0;const o=Math.max(0,(item.varValue||0)-(item.varMin||0));return s+b+Math.round(o*(item.varRate||0));},0);
      return gross-this.totalDiscount();
    },

    parseSetupRange(a){const pts=(a.setup||'').replace(/[$,]/g,'').split(/[–—-]/);if(pts.length>=2){const lo=parseFloat(pts[0]),hi=parseFloat(pts[1]);if(!isNaN(lo))a.setupLow=lo;if(!isNaN(hi))a.setupHigh=hi;}},
    rebuildShort(a){a.retainerShort=a.varLabel?(a.retainerBase||'$0')+'/mo (+ variable)':(a.retainerBase||'$0')+'/mo fixed';},
    syncQuoteAgent(agent){this.quote.forEach(qi=>{if(qi.name===agent.name&&qi.platform===agent._platformName){Object.assign(qi,{setup:agent.setup,setupLow:agent.setupLow,setupHigh:agent.setupHigh,tier:agent.tier,retainerBase:agent.retainerBase,retainerNum:agent.retainerNum,retainerShort:agent.retainerShort,varRate:agent.varRate,varMin:agent.varMin});}});},
    resetOneAgent(agent){const defP=this._defaults.find(p=>p.name===agent._platformName);if(!defP)return;const defA=defP.agents.find(a=>a.name===agent.name);if(!defA)return;const uid=agent._uid,pname=agent._platformName;Object.assign(agent,JSON.parse(JSON.stringify(defA)));agent._uid=uid;agent._platformName=pname;},
    resetAllAgents(){if(!confirm(this.lang==='es'?'¿Resetear TODOS los agentes?':'Reset ALL agents to defaults?'))return;this.platforms=buildPlatforms();},

    applyLogoUrl(){this.customLogo=this.logoUrlInput;this.persist();},
    onLogoFile(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{this.customLogo=ev.target.result;this.logoUrlInput=ev.target.result;this.persist();};r.readAsDataURL(f);},
    onPlatFile(e,pid){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const p=this.platforms.find(pl=>pl.id===pid);if(p){p.img=ev.target.result;this.persist();}};r.readAsDataURL(f);},
    resetPlatImg(pid){const p=this.platforms.find(pl=>pl.id===pid);if(p){p.img=DEFAULT_IMGS[pid]||p.img;this.persist();}},

    openPdfCustomizer(){this.previewQ={name:this.projectName,agents:this.quote};this.showCustomizer=true;},

    openPdfCustomizerForVersion(pi,vi){const v=this.savedProjects[pi].versions[vi];this.previewQ={name:this.savedProjects[pi].name+' v'+(vi+1),agents:v.agents};this.showCustomizer=true;},
    openPDF(){this.showCustomizer=false;this.showModal=true;},
    previewPlatforms(){return[...new Set(this.previewQ.agents.map(q=>q.platform))];},
    previewByPlatform(p){return this.previewQ.agents.filter(q=>q.platform===p);},

    saveProject(){
      if(!this.quote.length){alert(this.lang==='es'?'Agregá agentes primero.':'Add agents first.');return;}
      const name=this.projectName||(this.lang==='es'?'Proyecto ':'Project ')+(this.savedProjects.length+1);
      const snapshot={date:new Date().toLocaleString('en-US',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}),agents:JSON.parse(JSON.stringify(this.quote)),setupLow:this.setupLow(),setupHigh:this.setupHigh(),retainerTotal:this.retainerTotal()};
      const ei=this.savedProjects.findIndex(p=>p.id===this.currentProjectId);
      if(ei>=0){const proj=this.savedProjects[ei];if(!proj.versions)proj.versions=[];proj.versions.push(snapshot);proj.name=name;proj.date=snapshot.date;proj.agents=snapshot.agents;proj.setupLow=snapshot.setupLow;proj.setupHigh=snapshot.setupHigh;proj.retainerTotal=snapshot.retainerTotal;}
      else{const id=Date.now();this.savedProjects.unshift({id,name,date:snapshot.date,agents:snapshot.agents,setupLow:snapshot.setupLow,setupHigh:snapshot.setupHigh,retainerTotal:snapshot.retainerTotal,versions:[snapshot],_showVersions:false});this.currentProjectId=id;}
      this.persist();
      const btn=event.target;const orig=btn.textContent;btn.textContent='✓ '+(this.lang==='es'?'Guardado!':'Saved!');setTimeout(()=>btn.textContent=orig,1500);
    },
    loadProject(pi){const proj=this.savedProjects[pi];this.quote=JSON.parse(JSON.stringify(proj.agents));this.projectName=proj.name;this.currentProjectId=proj.id;this.activeTab='quoter';},

    deleteProject(pi){if(!confirm(this.lang==='es'?'¿Eliminar?':'Delete?'))return;if(this.currentProjectId===this.savedProjects[pi].id)this.currentProjectId=null;this.savedProjects.splice(pi,1);},
    clearAllProjects(){if(!confirm(this.lang==='es'?'¿Eliminar TODOS los proyectos?':'Delete ALL projects?'))return;this.savedProjects=[];this.currentProjectId=null;},

    loadCompareProject(side){const idxStr=side==='A'?this.compareAId:this.compareBId;if(idxStr===''||idxStr===null)return;const idx=parseInt(idxStr);if(isNaN(idx)||!this.savedProjects[idx])return;const proj=this.savedProjects[idx];const agents=JSON.parse(JSON.stringify(proj.agents));if(side==='A')this.compareA={name:proj.name,agents};else this.compareB={name:proj.name,agents};},
    loadCurrentToCompare(side){if(side==='A')this.compareA={name:this.projectName||'Current',agents:JSON.parse(JSON.stringify(this.quote))};else this.compareB={name:this.projectName||'Current',agents:JSON.parse(JSON.stringify(this.quote))};},
    compareSetupLow(side){return(side==='A'?this.compareA:this.compareB).agents.reduce((s,a)=>s+(a.setupLow||0),0);},
    compareRetainer(side){return(side==='A'?this.compareA:this.compareB).agents.reduce((s,i)=>{const b=i.retainerNum||0;const o=Math.max(0,(i.varValue||0)-(i.varMin||0));return s+b+Math.round(o*(i.varRate||0));},0);},

    exportComparePDF(){
      const roiA=this.calcROI(this.compareA.agents),roiB=this.calcROI(this.compareB.agents);
      const win=window.open('','_blank');
      win.document.write(`<!DOCTYPE html><html><head><title>SWL Compare</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter',sans-serif;font-size:12px;background:#fff;padding:28px 32px;color:#1a1a1a}h1{font-size:18px;font-weight:800;margin-bottom:4px}p.sub{font-size:11px;color:#888;margin-bottom:20px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}.col{border:1px solid #eee;border-radius:8px;padding:14px}.col h2{font-size:13px;font-weight:700;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #eee}table{width:100%;border-collapse:collapse;font-size:11px}th{text-align:left;padding:5px 7px;background:#f8f8f8;font-weight:600;color:#666;font-size:10px;border-bottom:1px solid #eee}td{padding:5px 7px;border-bottom:1px solid #f5f5f5}tr:last-child td{border-bottom:none}.summary{border:1px solid #eee;border-radius:8px;padding:14px}.summary h2{font-size:13px;font-weight:700;margin-bottom:10px}.row{display:grid;grid-template-columns:160px 1fr 1fr;gap:10px;padding:6px 0;border-bottom:1px solid #f5f5f5;font-size:11px}.row:last-child{border-bottom:none}.metric{color:#888}.val{font-weight:700;font-family:monospace}.footer{margin-top:16px;font-size:9px;color:#aaa;display:flex;justify-content:space-between}@media print{body{padding:16px}}</style></head><body><h1>SWL Scenario Comparison</h1><p class="sub">Prepared by SWL Consulting · ${this.today()}</p><div class="grid"><div class="col"><h2>${this.compareA.name||'Scenario A'}</h2><table><thead><tr><th>Agent</th><th>Retainer</th></tr></thead><tbody>${this.compareA.agents.map(a=>`<tr><td>${a.name}</td><td style="font-family:monospace">$${this.fmtN(a.retainerNum||0)}/mo</td></tr>`).join('')}</tbody></table></div><div class="col"><h2>${this.compareB.name||'Scenario B'}</h2><table><thead><tr><th>Agent</th><th>Retainer</th></tr></thead><tbody>${this.compareB.agents.map(a=>`<tr><td>${a.name}</td><td style="font-family:monospace">$${this.fmtN(a.retainerNum||0)}/mo</td></tr>`).join('')}</tbody></table></div></div><div class="summary"><h2>Comparison Summary</h2><div class="row" style="font-weight:700;color:#888;font-size:10px"><span></span><span>${this.compareA.name||'A'}</span><span>${this.compareB.name||'B'}</span></div><div class="row"><span class="metric">Agents</span><span class="val">${this.compareA.agents.length}</span><span class="val">${this.compareB.agents.length}</span></div><div class="row"><span class="metric">Setup (low)</span><span class="val">$${this.fmtN(this.compareSetupLow('A'))}</span><span class="val">$${this.fmtN(this.compareSetupLow('B'))}</span></div><div class="row"><span class="metric">Monthly Retainer</span><span class="val">$${this.fmtN(this.compareRetainer('A'))}/mo</span><span class="val">$${this.fmtN(this.compareRetainer('B'))}/mo</span></div><div class="row"><span class="metric">Hours saved/mo</span><span class="val">${roiA.hours}h</span><span class="val">${roiB.hours}h</span></div><div class="row"><span class="metric">Avg ROI</span><span class="val">${roiA.roi}x</span><span class="val">${roiB.roi}x</span></div><div class="row"><span class="metric">Payback period</span><span class="val">${roiA.payback} mo</span><span class="val">${roiB.payback} mo</span></div></div><div class="footer"><span>SWL Consulting · www.swlconsulting.com</span><span>${this.today()}</span></div></body></html>`);
      win.document.close();setTimeout(()=>{win.focus();win.print();},500);
    },

    fmtN(n){return Math.round(n).toLocaleString('en-US');},
    today(){return new Date().toLocaleDateString(this.lang==='es'?'es-AR':'en-US',{year:'numeric',month:'long',day:'numeric'});},

    printPDF(){
      const content=document.getElementById('pdf-content').innerHTML;
      const win=window.open('','_blank');
      win.document.write(`<!DOCTYPE html><html><head><title>${this.previewQ.name||'SWL Quote'}</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter',sans-serif;font-size:12px;background:#fff;padding:26px 30px;max-width:760px;margin:0 auto;color:#1a1a1a}@media print{body{padding:16px}}</style></head><body>${content}</body></html>`);
      win.document.close();setTimeout(()=>{win.focus();win.print();},500);
    },

    exportCSV(){
      const SEP=';';
      const rows=[['Platform','Tier Section','Agent','Tier','Setup Min (USD)','Setup Max (USD)','Retainer Base (USD)','Retainer Computed (USD)','Discount %','Note']];
      this.quote.forEach(item=>{
        const base=item.retainerNum||0;
        const over=Math.max(0,(item.varValue||0)-(item.varMin||0));
        const gross=base+Math.round(over*(item.varRate||0));
        const disc=this.getAgentDiscount(item);
        const computed=Math.round(gross*(1-disc/100));
        const secLabel=item.tier===1?'Light':item.tier===2?'Full':'Add-on';
        rows.push([item.platform,secLabel,item.name,'T'+item.tier,item.setupLow||0,item.setupHigh||0,base,computed,disc+'%',(item.note&&item.note[this.lang])||'']);
      });
      rows.push([]);
      rows.push(['TOTALS','','','',this.setupLow(),this.setupHigh(),this.quote.reduce((s,i)=>s+(i.retainerNum||0),0),this.retainerTotal(),'','']);
      const BOM='\uFEFF';
      const csv=BOM+rows.map(r=>r.map(c=>{const v=String(c);return(v.includes(SEP)||v.includes('"')||v.includes('\n'))?'"'+v.replace(/"/g,'""')+'"':v;}).join(SEP)).join('\r\n');
      const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
      const url=URL.createObjectURL(blob);
      const el=document.createElement('a');el.href=url;el.download=(this.projectName||'swl-quote')+'.csv';el.click();
      URL.revokeObjectURL(url);
    },
  };
};
</script>
</body>
